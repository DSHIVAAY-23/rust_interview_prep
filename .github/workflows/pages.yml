name: Deploy rust-prep to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Rust_website/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'Rust_website'
      - id: deployment
        uses: actions/deploy-pages@v4
